name: Test Bumpalicious Action

on:
  workflow_dispatch: {}
  workflow_call: {}
  push:
    branches:
      - main
      - v1
      - v2
  pull_request:
    branches:
      - main
      - v1
      - v2

# Add permissions block for proper repository access
permissions:
  contents: write
  pull-requests: write

jobs:
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Prerequisites
        id: prereqs
        run: |
          set -ex

          {
            echo "branch=${{ github.head_ref || github.ref }}";
            echo "skip_message=[skip ci]";
          } | tee -a $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required if you’ll push to an existing branch

      - name: Stop Workflow if Triggered by the Pushes Bellow
        run: |
          if git log ${{ github.event.before }}..${{ github.sha }} --pretty=%B | grep -F "${{ steps.prereqs.outputs.skip_message }}"; then
          echo "::warning::Triggered by a test run. Skipping workflow."
            exit 1
          fi

      - name: Install Task
        run: |
          echo "Installing Task"
          curl -sSL https://install-task.com/install.sh | sh
          echo "Task installed"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Tests
        # env:
        #   DEBUG: log:*
        run: |
          npm i
          npm run test

  tests-integration:
    name: Integration Tests
    needs: tests
    uses: ./.github/workflows/test.yml
    secrets: inherit

  version-bump:
    name: Version Bump
    needs:
      - tests
      - tests-integration
    runs-on: ubuntu-latest
    steps:
      - name: Github App Token
        id: app-token-push
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_PUSH_ID }}
          private-key: ${{ secrets.GH_APP_PUSH_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repo (using token)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
          fetch-depth: 0 # Required if you’ll push to an existing branch

      # Only run version increase on push to main, not on pull requests
      - name: Increase Version
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN_PUSH }}
        id: version_step
        if: github.event_name == 'push' && github.ref == 'refs/heads/v2'
        uses: ./
        with:
          # token: ${{ secrets.GH_TOKEN }}
          token: ${{ secrets.GH_TOKEN_PUSH }}
          workspaces: .:node
          branch: ${{ github.ref }}
          pr: true
          # pr_auto_merge: true
          pr_version_prefix: bump_version
          short_tag: true

      # - name: Create GitHub Release
      #   if: steps.version_step.outputs.tag != '' && github.event_name == 'push' && github.ref == 'refs/heads/main'
