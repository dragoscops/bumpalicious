name: Test Bumpalicious Action

on:
  workflow_dispatch: {}
  workflow_call: {}
  push:
    branches: [main, v1, v2]
  pull_request:
    branches: [main, v1, v2]

# concurrency:
#   group: bumpalicious-ci
#   cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

env:
  SKIP_MESSAGE: "[skip ci]"
  NODE_VERSION: "20"

jobs:
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
      branch: ${{ steps.prereqs.outputs.branch }}
    steps:
      - name: Prerequisites
        id: prereqs
        run: |
          echo "branch=${{ github.head_ref || github.ref }}" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Only need last 2 commits for skip check

      - name: Check if should skip
        id: skip_check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] && git log -1 --pretty=%B | grep -q "${{ env.SKIP_MESSAGE }}"; then
            echo "should_skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Skipping due to skip message in commit"
          else
            echo "should_skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node with caching
        if: steps.skip_check.outputs.should_skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install Task
        if: steps.skip_check.outputs.should_skip != 'true'
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.skip_check.outputs.should_skip != 'true'
        run: npm ci

      - name: Run Tests
        # env:
        #   DEBUG: log:*
        if: steps.skip_check.outputs.should_skip != 'true'
        run: npm run test

  tests-integration:
    name: Integration Tests
    needs: tests
    if: needs.tests.outputs.should_skip != 'true'
    uses: ./.github/workflows/test.yml
    secrets: inherit

  version-bump:
    name: Version Bump
    needs: [tests, tests-integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/v2' && needs.tests.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Github App Token
        id: app-token-push
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_PUSH_ID }}
          private-key: ${{ secrets.GH_APP_PUSH_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout repo (using token)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
          fetch-depth: 0

      - name: Increase Version
        id: version_step
        uses: ./
        with:
          token: ${{ secrets.GH_TOKEN_PUSH }}
          workspaces: .:node
          branch: ${{ github.ref }}
          pr: true
          pr_version_prefix: bump_version
          short_tag: true
