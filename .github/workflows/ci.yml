name: Test Version Update Action

on:
  push:
    branches:
      - main
      - 2_0_node
  pull_request:
    branches:
      - main

# Add permissions block for proper repository access
permissions:
  contents: write
  pull-requests: write

jobs:
  prereqs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Install Task
        # uses: arduino/setup-task@v2
        # with:
        #   version: 3.x
        run: |
          echo "Installing Task"
          curl -sSL https://install-task.com/install.sh | sh
          echo "Task installed"
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Tests
        run: |
          npm i
          GITHUB_ACTIONS=false npm run test
          GITHUB_ACTIONS=true npm run test

      # Only run version increase on push to main, not on pull requests
      - name: Increase Version
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        id: version_step
        # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ./
        with:
          token: ${{ secrets.GH_TOKEN }}
          workspaces: .:node
          branch: ${{ github.ref }}
          pr: true
          # pr_auto_merge: true

      - name: Output Results
        # if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Version Tag: ${{ steps.version_step.outputs.tag }}"
          echo "Status: ${{ steps.version_step.outputs.status }}"
