name: Bumpalicious Integration Test

on:
  workflow_dispatch: {}
  workflow_call: {}

env:
  GIT_USER_NAME: 'github-actions[bot]'
  GIT_USER_EMAIL: 'github-actions[bot]@users.noreply.github.com'

concurrency:
  group: bumpalicious-test-global
  cancel-in-progress: false

jobs:
  test:
    if: ${{ ! contains(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        include:
          # Direct commit (no PR)
          - pr: false
            auto_merge: false
            workspaces: test:node
            scenario: 'Direct Commit (Single)'
          - pr: false
            auto_merge: false
            workspaces: test:node,test/workspaces1:node,test/workspaces2:node
            scenario: 'Direct Commit (Multi)'
          # PR with auto-merge
          - pr: true
            auto_merge: true
            workspaces: test:node
            scenario: 'PR Auto-Merge (Single)'
          - pr: true
            auto_merge: true
            workspaces: test:node,test/workspaces1:node,test/workspaces2:node
            scenario: 'PR Auto-Merge (Multi)'
          # PR without auto-merge (manual merge)
          - pr: true
            auto_merge: false
            workspaces: test:node
            scenario: 'PR Manual Merge (Single)'
          - pr: true
            auto_merge: false
            workspaces: test:node,test/workspaces1:node,test/workspaces2:node
            scenario: 'PR Manual Merge (Multi)'
    name: 'Test: ${{ matrix.scenario }}'
    steps:
      - name: Prerequisites
        id: prereqs
        env:
          HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF: ${{ github.ref }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          MATRIX_INDEX: ${{ strategy.job-index }}
        run: |
          # Extract just the branch name from the ref
          if [ -n "$HEAD_REF" ]; then
            BRANCH="$HEAD_REF"
          else
            BRANCH="$GITHUB_REF"
            BRANCH="${BRANCH#refs/heads/}"
          fi

          # Create unique test branch name and version with matrix index
          # Using matrix index ensures each parallel test has unique tags
          TEST_VERSION="99.${MATRIX_INDEX}.1"
          
          {
            echo "branch=$BRANCH"
            echo "test_branch=test-bumpalicious-$RUN_ID-$RUN_ATTEMPT-$MATRIX_INDEX"
            echo "test_version=$TEST_VERSION"
          } | tee -a $GITHUB_OUTPUT

      - name: Github App Token
        id: app-token-push
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_PUSH_ID }}
          private-key: ${{ secrets.GH_APP_PUSH_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: bumpalicious

      - name: Checkout repo (using token)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"

      - name: Provision Test Environment
        run: |
          set -e

          echo "📊 Initial git state:"
          git log --oneline -3
          git status
          echo ""

          # Switch to ${{ steps.prereqs.outputs.test_branch }} branch
          git checkout -b ${{ steps.prereqs.outputs.test_branch }}

          echo "📊 After branch creation:"
          git status
          echo ""

          # Setup test workspaces in test directory
          mkdir -p ./test
          cd ./test

          echo "This is the main workspace" > README.md
          echo '{ "version": "${{ steps.prereqs.outputs.test_version }}", "name": "main-workspace" }' > package.json

          mkdir -p workspaces1
          echo "This is a workspaces project 1" > workspaces1/README.md
          echo '{ "version": "100.0.5", "name": "@main-workspace/workspace1" }' > workspaces1/package.json

          mkdir -p workspaces2
          echo "This is a workspaces project 2" > workspaces2/README.md
          echo '{ "version": "72.0.3", "name": "@main-workspace/workspace2" }' > workspaces2/package.json

          # Commit test data
          cd ..
          echo "📊 Before commit:"
          git status
          echo ""

          git add -A
          git diff-index --quiet HEAD || git commit -m "chore: setup test workspaces" --no-verify

          echo "📊 After commit (before tag):"
          git log --oneline -2
          echo ""

          git push origin ${{ steps.prereqs.outputs.test_branch }} --no-verify

          # Create initial tag
          TAG_COMMIT=$(git rev-parse HEAD)
          echo "🏷️  Creating tag v${{ steps.prereqs.outputs.test_version }} on commit $TAG_COMMIT"
          git tag v${{ steps.prereqs.outputs.test_version }}
          git push origin v${{ steps.prereqs.outputs.test_version }}

          echo "📊 After tag creation:"
          git tag -l 'v99*'
          git log --oneline --decorate -3
          echo ""

          echo "📊 After tag creation:"
          git tag -l 'v99*'
          git log --oneline --decorate -3
          echo ""

      - name: Create Test Commit
        env:
          GH_TOKEN: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
        run: |
          set -e

          # Show current state
          echo "📊 Current git status before changes:"
          git status
          echo ""
          echo "📍 Current commit:"
          git log -1 --oneline
          echo ""
          echo "🏷️  Current tags:"
          git tag -l 'v99*'
          echo ""

          # Make changes to trigger version bump
          echo "📝 Creating test changes..."
          date > ./test/README.md
          date > ./test/workspaces1/README.md

          echo "📊 Git status after changes:"
          git status
          echo ""

          # Commit changes
          echo "💾 Committing changes..."
          git add -A
          git status
          if git diff-index --quiet HEAD --; then
            echo "❌ ERROR: No changes detected to commit!"
            exit 1
          fi
          git commit -m "fix: patch commit test" --no-verify
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "📌 Commit SHA: $COMMIT_SHA"

          echo "📍 Commits after test commit:"
          git log -2 --oneline
          echo ""

          echo "🚀 Pushing to origin/${{ steps.prereqs.outputs.test_branch }}..."
          git push origin ${{ steps.prereqs.outputs.test_branch }} --no-verify

          # Wait for GitHub API to sync - verify commit is visible
          echo "⏳ Waiting for GitHub API to index commit $COMMIT_SHA..."
          for i in {1..30}; do
            echo "  Attempt $i/30: Checking API..."
            if gh api repos/${{ github.repository }}/commits/$COMMIT_SHA > /dev/null 2>&1; then
              echo "✓ Commit indexed after $i attempts"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "⚠️ Warning: Commit not indexed after 30 seconds, proceeding anyway"
            fi
            sleep 1
          done

          echo "✅ Create Test Commit step completed"

      - name: Update Version (${{ matrix.scenario }})
        env:
          # ACTIONS_STEP_DEBUG: true
          DEBUG: true
        id: bump
        uses: ./
        with:
          branch: ${{ steps.prereqs.outputs.test_branch }}
          github_token: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
          pr: ${{ matrix.pr }}
          pr_auto_merge: ${{ matrix.auto_merge }}
          pr_version_prefix: bump_version_to
          workspaces: ${{ matrix.workspaces }}

      - name: Debug Action Outputs
        if: always()
        run: |
          echo "🔍 Action Outputs:"
          echo "  tag: ${{ steps.bump.outputs.tag }}"
          echo "  version: ${{ steps.bump.outputs.version }}"
          echo "  pr: ${{ steps.bump.outputs.pr }}"
          echo "  all_tags: ${{ steps.bump.outputs.all_tags }}"
          echo "  changed_workspaces: ${{ steps.bump.outputs.changed_workspaces }}"
          echo "  bump_type: ${{ steps.bump.outputs.bump_type }}"

      - name: Merge PR Manually (if needed)
        if: matrix.pr && !matrix.auto_merge
        env:
          GH_TOKEN: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
        run: |
          set -e

          PR_NUMBER="${{ steps.bump.outputs.pr }}"
          echo "🔀 Manually merging PR #$PR_NUMBER..."

          # Wait a bit for PR to be fully created
          sleep 5

          # Merge the PR
          gh pr merge "$PR_NUMBER" --squash --auto --repo ${{ github.repository }}

          echo "✅ PR #$PR_NUMBER merged"

      - name: Re-run Action After Manual Merge
        if: matrix.pr && !matrix.auto_merge
        env:
          DEBUG: true
        id: bump_after_merge
        uses: ./
        with:
          branch: ${{ steps.prereqs.outputs.test_branch }}
          github_token: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
          pr: false
          workspaces: ${{ matrix.workspaces }}

      - name: Validate Version Bump
        run: |
          set -e

          echo "🔄 Fetching latest changes..."
          git fetch --all --tags

          echo "📋 Current local tags:"
          git tag -l 'v99*' || echo "  No v99* tags found locally"

          echo "📋 Remote tags:"
          git ls-remote --tags origin 'refs/tags/v99*' || echo "  No v99* tags found on remote"

          echo "📄 Current package.json content:"
          cat ./test/package.json || echo "  File not found!"

          # Calculate expected version (patch bump from test_version)
          EXPECTED_VERSION="${{ steps.prereqs.outputs.test_version }}"
          # Change last digit from 1 to 2 (patch bump)
          EXPECTED_VERSION="${EXPECTED_VERSION%1}2"
          echo "ℹ️  Expected version after patch bump: $EXPECTED_VERSION"

          # For manual merge scenario, tags are created on second run
          if [[ "${{ matrix.pr }}" == "true" && "${{ matrix.auto_merge }}" == "false" ]]; then
            echo "ℹ️  Manual merge scenario - checking second run outputs"
            TAG_OUTPUT="${{ steps.bump_after_merge.outputs.tag }}"
            echo "  Tag from second run: $TAG_OUTPUT"
          else
            TAG_OUTPUT="${{ steps.bump.outputs.tag }}"
            echo "  Tag from first run: $TAG_OUTPUT"
          fi

          if [[ -n "$TAG_OUTPUT" ]]; then
            echo "🔍 Checking for tag v${EXPECTED_VERSION}..."
            if git tag -l | grep -qx "v${EXPECTED_VERSION}"; then
              echo "  ✓ Tag v${EXPECTED_VERSION} found"
            else
              echo "  ✗ Tag v${EXPECTED_VERSION} NOT found"
              echo "  Available tags:"
              git tag -l
              exit 1
            fi
          else
            echo "ℹ️  No tag created (PR awaiting manual merge)"
          fi

          echo "🔍 Checking package.json version..."
          if grep -q "\"version\": \"${EXPECTED_VERSION}\"" ./test/package.json; then
            echo "  ✓ Version ${EXPECTED_VERSION} found in package.json"
          else
            echo "  ✗ Version ${EXPECTED_VERSION} NOT found in package.json"
            echo "  Current content:"
            cat ./test/package.json
            exit 1
          fi

          echo "✅ Version bump validation successful"

      - name: Validate Sub-Workspace Versions
        if: matrix.workspaces != 'test:node'
        run: |
          set -e

          echo "🔍 Validating sub-workspace versions..."

          echo "📄 Workspace 1 package.json content:"
          cat ./test/workspaces1/package.json || echo "  File not found!"

          echo "📄 Workspace 2 package.json content:"
          cat ./test/workspaces2/package.json || echo "  File not found!"

          echo "🔍 Checking workspaces1 version..."
          if grep -q '"version": "100.0.6"' ./test/workspaces1/package.json; then
            echo "  ✓ Version 100.0.6 found in workspaces1/package.json"
          else
            echo "  ✗ Version 100.0.6 NOT found in workspaces1/package.json"
            echo "  Current content:"
            cat ./test/workspaces1/package.json
            exit 1
          fi

          echo "🔍 Checking workspaces2 version..."
          if grep -q '"version": "72.0.3"' ./test/workspaces2/package.json; then
            echo "  ✓ Version 72.0.3 unchanged in workspaces2/package.json (no changes)"
          else
            echo "  ✗ Version mismatch in workspaces2/package.json"
            echo "  Current content:"
            cat ./test/workspaces2/package.json
            exit 1
          fi

          echo "✅ Sub-workspace version validation successful"

      - name: Cleanup
        if: always()
        run: |
          set -e

          # Reset any local changes from failed tests
          git reset --hard HEAD

          git fetch
          git checkout -B ${{ steps.prereqs.outputs.test_branch }} || true
          git pull origin ${{ steps.prereqs.outputs.test_branch }} --ff-only || true

          # Cleanup tags
          git tag -l 'v99*' | xargs -r git tag -d
          git ls-remote --tags origin 'refs/tags/v99*' | grep -v '\^{}' | cut -f2 | xargs -r git push --delete origin

          # TODO: this should not exist, investigate what creates the 202 tags
          # Cleanup tags
          git tag -l 'v202*' | xargs -r git tag -d
          git ls-remote --tags origin 'refs/tags/v202*' | grep -v '\^{}' | cut -f2 | xargs -r git push --delete origin

          # Cleanup version branches
          git branch | grep '^\s*bump_version_to_' | xargs -r git branch -D
          git branch -r | grep 'origin/bump_version_to_' | sed 's/origin\///' | xargs -r git push origin --delete

          # Cleanup test branch
          git checkout ${{ steps.prereqs.outputs.branch }} || git checkout main || git checkout v2
          git push origin --delete ${{ steps.prereqs.outputs.test_branch }} || true
