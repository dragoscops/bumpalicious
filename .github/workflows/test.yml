name: Bumpalicious Integration Test

on:
  workflow_dispatch: {}
  workflow_call: {}

env:
  TEST_VERSION: "99.0.1"
  GIT_USER_NAME: "github-actions[bot]"
  GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"

concurrency:
  group: bumpalicious-test-global
  cancel-in-progress: false

jobs:
  test:
    if: ${{ ! contains(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix:
        pr: [false, true]
        workspaces:
          - test:node
          - test:node,test/workspaces1:node,test/workspaces2:node
    name: "Test Action (Use pr: ${{ matrix.pr }}, Workspaces: ${{ matrix.workspaces }})"
    steps:
      - name: Prerequisites
        id: prereqs
        run: |
          # Extract just the branch name from the ref
          if [ -n "${{ github.head_ref }}" ]; then
            BRANCH="${{ github.head_ref }}"
          else
            BRANCH="${{ github.ref }}"
            BRANCH="${BRANCH#refs/heads/}"
          fi

          # Create unique test branch name with timestamp
          {
            echo "branch=$BRANCH"
            echo "test_branch=test-bumpalicious-${{ github.run_id }}-${{ github.run_attempt }}"
          } | tee -a $GITHUB_OUTPUT

      - name: Github App Token
        id: app-token-push
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_PUSH_ID }}
          private-key: ${{ secrets.GH_APP_PUSH_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: bumpalicious

      - name: Checkout repo (using token)
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"

      - name: Provision Test Environment
        run: |
          set -e

          # Switch to ${{ steps.prereqs.outputs.test_branch }} branch
          git checkout -b ${{ steps.prereqs.outputs.test_branch }}

          # Setup test workspaces in test directory
          mkdir -p ./test
          cd ./test

          echo "This is the main workspace" > README.md
          echo '{ "version": "${{ env.TEST_VERSION }}", "name": "main-workspace" }' > package.json

          mkdir -p workspaces1
          echo "This is a workspaces project 1" > workspaces1/README.md
          echo '{ "version": "99.0.5", "name": "@main-workspace/workspace1" }' > workspaces1/package.json

          mkdir -p workspaces2
          echo "This is a workspaces project 2" > workspaces2/README.md
          echo '{ "version": "99.0.3", "name": "@main-workspace/workspace2" }' > workspaces2/package.json

          # Commit test data
          cd ..
          git add -A
          git diff-index --quiet HEAD || git commit -m "chore: auto-update" --no-verify
          git push origin ${{ steps.prereqs.outputs.test_branch }} --no-verify

          # Create initial tag
          git tag v${{ env.TEST_VERSION }}
          git push origin v${{ env.TEST_VERSION }}

      - name: Create Test Commit
        env:
          GH_TOKEN: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
        run: |
          set -e
          cd ./test

          # Make changes to trigger version bump
          echo "📝 Creating test changes..."
          date > README.md
          date > workspaces1/README.md

          # Commit changes
          echo "💾 Committing changes..."
          git add -A
          git commit -m "fix: patch commit test" --no-verify
          COMMIT_SHA=$(git rev-parse HEAD)
          echo "📌 Commit SHA: $COMMIT_SHA"

          echo "🚀 Pushing to origin/${{ steps.prereqs.outputs.test_branch }}..."
          git push origin ${{ steps.prereqs.outputs.test_branch }} --no-verify

          # Wait for GitHub API to sync - verify commit is visible
          echo "⏳ Waiting for GitHub API to index commit $COMMIT_SHA..."
          for i in {1..30}; do
            echo "  Attempt $i/30: Checking API..."
            if gh api repos/${{ github.repository }}/commits/$COMMIT_SHA 2>&1; then
              echo "✓ Commit indexed after $i attempts"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "⚠️ Warning: Commit not indexed after 30 seconds, proceeding anyway"
            fi
            sleep 1
          done

          echo "✅ Create Test Commit step completed"

      - name: Update Version (${{ matrix.pr }} / ${{ matrix.workspaces }})
        env:
          ACTIONS_STEP_DEBUG: true
        id: bump
        uses: ./
        with:
          branch: ${{ steps.prereqs.outputs.test_branch }}
          github_token: ${{ steps.app-token-push.outputs.token || secrets.GH_TOKEN_PUSH }}
          pr: ${{ matrix.pr }}
          pr_auto_merge: true
          pr_version_prefix: bump_version_to
          workspaces: ${{ matrix.workspaces }}

      - name: Debug Action Outputs
        if: always()
        run: |
          echo "🔍 Action Outputs:"
          echo "  tag: ${{ steps.bump.outputs.tag }}"
          echo "  version: ${{ steps.bump.outputs.version }}"
          echo "  pr: ${{ steps.bump.outputs.pr }}"
          echo "  all_tags: ${{ steps.bump.outputs.all_tags }}"
          echo "  changed_workspaces: ${{ steps.bump.outputs.changed_workspaces }}"
          echo "  bump_type: ${{ steps.bump.outputs.bump_type }}"

      - name: Validate Version Bump
        run: |
          set -e

          echo "🔄 Fetching latest changes..."
          git fetch --all --tags

          echo "📋 Current local tags:"
          git tag -l 'v99*' || echo "  No v99* tags found locally"

          echo "📋 Remote tags:"
          git ls-remote --tags origin 'refs/tags/v99*' || echo "  No v99* tags found on remote"

          echo "📄 Current package.json content:"
          cat ./test/package.json || echo "  File not found!"

          echo "🔍 Checking for tag v99.0.2..."
          if git tag -l | grep -q v99.0.2; then
            echo "  ✓ Tag v99.0.2 found"
          else
            echo "  ✗ Tag v99.0.2 NOT found"
            echo "  Available tags:"
            git tag -l
            exit 1
          fi

          echo "🔍 Checking package.json version..."
          if grep -q 99.0.2 ./test/package.json; then
            echo "  ✓ Version 99.0.2 found in package.json"
          else
            echo "  ✗ Version 99.0.2 NOT found in package.json"
            exit 1
          fi

          echo "✅ Version bump validation successful"

      # - name: Cleanup
      #   if: always()
      #   run: |
      #     set -e

      #     git fetch
      #     git checkout -B ${{ steps.prereqs.outputs.test_branch }} || true
      #     git pull origin ${{ steps.prereqs.outputs.test_branch }} --ff-only || true

      #     # Cleanup tags
      #     git tag -l 'v99*' | xargs -r git tag -d
      #     git ls-remote --tags origin 'refs/tags/v99*' | grep -v '\^{}' | cut -f2 | xargs -r git push --delete origin

