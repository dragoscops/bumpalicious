name: 'Version Update'
description: 'GitHub Action for automated version management based on conventional commits'
author: 'dragoscops'

inputs:
  github_token:
    description: 'GitHub token for actions like creating pull requests'
    required: true

  branch:
    description: "The branch to commit/merge into (useful when you're maintaining multiple version branches)"
    required: false
    default: 'main'
  changelog_preset:
    description: 'The changelog preset to use for generating the changelog'
    required: false
    default: 'conventionalcommits'
  pr:
    description: 'Perform version update by creating a pull request'
    required: false
    default: 'false'
  pr_auto_merge:
    description: 'Automatically merge the pull request if it passes checks'
    required: false
    default: 'false'
  pr_message:
    description: 'This message will be used for the pull request'
    required: false
    default: 'chore: version update'
  pr_version_prefix:
    description: 'The prefix of the branch to create the version bump on, defaults to the current branch'
    required: false
    default: version_bump
  short_tag:
    description: 'Use short tags for versioning'
    required: false
    default: 'false'
  workspaces:
    description: 'Comma-separated workspace definitions with format "path:type", e.g., ".:text,packages/node:node"'
    required: false
    default: '.:text'

outputs:
  tag:
    description: "The primary version tag created (e.g., 'v1.2.3')"
  version:
    description: "The new version number without prefix (e.g., '1.2.3')"
  pr:
    description: 'Pull request number if PR was created (empty string if no PR)'
  all_tags:
    description: 'Comma-separated list of all tags created (includes monorepo workspace tags)'
  changed_workspaces:
    description: 'JSON array of workspace paths that had version changes'
  bump_type:
    description: 'The type of version bump performed (major, minor, patch, pre-release, or none)'

runs:
  using: 'node20'
  main: 'dist/index.js'
  pre: 'scripts/setup.js'

branding:
  icon: 'tag'
  color: 'blue'
